<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tratamento de Dados</title>
    <style>
        body{
            background-color: rgb(37, 170, 214);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            color: yellow;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Estudos de JavaScript</p>
    <script>
        var n1 = Number(window.prompt('Digite o primeiro número: '));
        var n2 = Number(window.prompt('Digite o segundo número: '));
        var s = n1 + n2;
        window.alert(`A soma entre ${n1} e ${n2} é ${s}`)
        // + serve para adição
        // + também serve para concatenação
    </script>
</body>
</html>

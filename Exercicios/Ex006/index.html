<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        body{
            background-color: rgb(41, 176, 221);
            color: white;
            font-family: Arial, Helvetica, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        div#area{
            background-color: blue;
            color: black;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>

    <script>
        var a = document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar(){
            a.innerHTML = 'Clicou!'
            a.style.background = 'red'
        }

        function entrar() {
            a.innerHTML = 'Entrou!'
            a.style.background = 'yellow'
        }

        function sair() {
            a.innerHTML = 'Saiu!'
            a.style.background = 'green'
        }
    </script>
</body>
</html>

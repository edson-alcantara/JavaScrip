<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de String</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    
    <script>
        var nome = window.prompt('Qual é o seu nome?');
        document.write(`Seu nome ${nome} tem ${nome.length} letras <br/>`);
        document.write(`Seu nome em maiúsculo é ${nome.toUpperCase()}<br/>`);
        document.write(`Seu nome em minúsculo é ${nome.toLowerCase()}<br/>`);
    </script>
</body>
</html>
